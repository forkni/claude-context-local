name: Branch Protection

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

jobs:
  validate:
    name: Validate Branch State
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for branch comparison

      - name: Check for local-only files
        run: |
          echo "Checking for accidentally committed local files..."

          # Check for prohibited files
          FOUND_ISSUES=0

          for file in CLAUDE.md MEMORY.md; do
            if git ls-files | grep -q "^$file$"; then
              echo "❌ ERROR: $file is tracked in git (should be local-only)"
              FOUND_ISSUES=1
            fi
          done

          # Check for prohibited directories
          for dir in _archive benchmark_results; do
            if git ls-files | grep -q "^$dir/"; then
              echo "❌ ERROR: $dir/ is tracked in git (should be local-only)"
              FOUND_ISSUES=1
            fi
          done

          if [ $FOUND_ISSUES -eq 0 ]; then
            echo "✅ No local-only files detected"
          else
            echo ""
            echo "Fix: Remove these files from git tracking"
            exit 1
          fi

      - name: Verify .gitattributes exists
        run: |
          if [ ! -f .gitattributes ]; then
            echo "❌ ERROR: .gitattributes not found"
            echo "This file is required for proper merge behavior"
            exit 1
          fi
          echo "✅ .gitattributes found"

      - name: Check for unauthorized docs
        run: |
          echo "Checking docs/ directory..."

          # Allowed public documentation files (main branch)
          ALLOWED_DOCS="ADVANCED_FEATURES_GUIDE.md|BENCHMARKS.md|CALL_GRAPH_TUNING.md|CLAUDE_MD_TEMPLATE.md|claude_code_config.md|DOCUMENTATION_INDEX.md|GIT_WORKFLOW.md|HYBRID_SEARCH_CONFIGURATION_GUIDE.md|INSTALLATION_GUIDE.md|MCP_TOOLS_REFERENCE.md|MODEL_MIGRATION_GUIDE.md|OBSERVABILITY.md|PYTORCH_COMPATIBILITY.md|VERSION_HISTORY.md"

          # Find unauthorized docs (only check on main branch)
          # docs/adr/ subtree is always permitted (architecture decision records)
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            UNAUTHORIZED=$(git ls-files docs/ | grep -v -E "docs/($ALLOWED_DOCS)$" | grep -v "^docs/adr/" || true)

            if [ -n "$UNAUTHORIZED" ]; then
              echo "❌ ERROR: Unauthorized documentation files found on main branch:"
              echo "$UNAUTHORIZED"
              echo ""
              echo "Allowed top-level docs:"
              echo "$ALLOWED_DOCS" | tr '|' '\n'
              echo "(docs/adr/ subtree is always permitted)"
              exit 1
            fi
          fi

          echo "✅ Documentation validation passed"

  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    needs: validate
    # Only run tests on development branch (main branch has tests/ removed per .gitattributes)
    if: github.ref == 'refs/heads/development'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.11'
          enable-cache: true  # uploads uv store to GitHub Actions cache (10 GB free tier)

      - name: Install dependencies
        run: uv sync --locked --extra test --extra callgraph
        # Note: uv.lock pins torch to pytorch-cu128 on linux; installs CUDA wheels (~2.3 GB).
        # Tests mock torch so GPU is not needed; subsequent runs use the Actions cache.

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --tb=short --maxfail=20 \
            --ignore=tests/slow_integration/ \
            --cov --cov-branch --cov-report=term-missing --cov-report=xml --cov-fail-under=77

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: development
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.11'
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --extra dev --extra callgraph
        # dev → pyrefly; callgraph → libcst; base deps → numpy/dspy/mcp/etc.
        # so pyrefly resolves third-party imports (was: uvx isolated env → 50 false
        # missing-import errors). Torch wheels are heavy (~2.3 GB) but cached by setup-uv.

      - name: Run ruff check (linting + import sorting)
        run: uvx ruff check .
        # Blocking gate — ruff is already enforced locally via commit_enhanced.sh

      - name: Check formatting (ruff format)
        run: uvx ruff format --check .
        # Blocking gate — ruff format is already enforced locally

      - name: Run type checking (pyrefly)
        run: uv run pyrefly check
        # Blocking gate — pyrefly exits 0 consistently on development (verified 2026-06-30)

      - name: Run pre-commit hooks
        run: uvx pre-commit run --all-files
        continue-on-error: true
        # Enforces markdownlint, file hygiene, ruff --fix; flip to blocking once verified green

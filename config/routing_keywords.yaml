        - deserialize
        - to_dict
        - from_dict
        - json
        # Embedding and indexing
        - embedding
        - embed
        - indexing
        - index
        - incremental
        - reindex
        # Vector search
        - faiss
        - vector
        - vectors
        - similarity
        - dense
        # System integration
        - system
        - integration
        - connection

# Query Routing Configuration for Multi-Model Semantic Search
#
# This file defines routing rules for the QueryRouter system that selects
# the optimal embedding model based on query characteristics.
#
# Last updated: 2026-01-16
# Source: search/query_router.py (Task 2.2 - Phase 2 refactoring)

# ============================================================================
# Full Model Pool Configuration (12GB+ VRAM GPUs)
# ============================================================================
# Used when multi_model_pool="full" (default)
# Models: CodeRankEmbed, Qwen3-0.6B

full_pool:
  # Confidence threshold for routing (below this, use default model)
  # Raised to 0.35 to require 4+ keyword matches before routing away from default
  # Prevents weak matches (e.g., "tree"/"index"=0.10, "embedding"+"config"=0.30)
  # from overriding qwen3_0.6b, which excels at semantic code discovery
  confidence_threshold: 0.35

  # Default fallback model (qwen3_0.6b excels at semantic code discovery)
  default_model: qwen3_0.6b

  # Explicit precedence for tie-breaking
  # When scores are within 0.01 margin, use this order:
  # 1. Qwen3-0.6B (implementation logic, semantic discovery)
  # 2. CodeRankEmbed (function localization, navigational queries)
  precedence:
    - qwen3_0.6b
    - coderankembed

  # Model-specific routing rules
  models:
    qwen3_0.6b:
      weight: 1.2
      description: "Implementation queries and specialized algorithms"
      keywords:
        # Implementation-heavy queries (3/8 wins)
        - implementation
        - implement
        - implementing
        - implements
        - how to implement
        - algorithm
        - algorithmic
        - algorithms
        - pattern
        - patterns
        - design pattern
        - how does
        - how do
        - how is
        - how to
        - how can
        - class structure
        - method flow
        - function flow
        - function
        - method
        - class
        - complete system
        - full implementation
        # Error handling (verified win) - expanded
        - error
        - error handling
        - exception
        - try except
        - error pattern
        - exception handling
        - catch
        - raise
        - throw
        # BM25 implementation (verified win) - expanded
        - bm25
        - sparse index
        - keyword search
        - index implementation
        - search implementation
        - search
        - searching
        - query
        # Multi-hop search (verified win) - expanded
        - multi-hop
        - multi hop
        - iterative search
        - search algorithm
        - hop
        - iterative
        - recursive
        # Common programming terms
        - code
        - coding
        - write
        - create
        - build
        # Async programming
        - async
        - await
        - coroutine
        - asyncio
        - async def
        - concurrent
        - concurrency
        # Validation and code logic (2025-12-15)
        - validate
        - validation
        - validator
        - validators
        - handler
        - handlers
        - registry
        - registries
        - extract
        - extraction
        - extractor
        - parser
        - parsing
        - parse
        - encode
        - decode
        - format
        - transform
        # Specialized logic (moved from coderankembed)
        - reranking
        - rrf
        - reciprocal rank
        - rank fusion
        - rerank
        - normalization
        - normalize
        - generic
        - template
        - polymorphism
        - fusion
        - fuse
        - combine
        - binary
        # Vector search understanding (2026-02-23)
        # "how does FaissVectorIndex store embeddings" must route to qwen3, not bge_code.
        # Root: bge_code's domain keywords (faiss, vector, store, index, embedding, embed)
        # count=6 beat qwen3's intent keywords (how does, how do) count=2 despite the
        # query being a class-understanding query.
        # Fix: add matching terms so qwen3 reaches 6 matches × 1.2 = 0.72 vs bge_code 0.60.
        # "faiss"/"vector"/"vectors" — FAISS is almost always a conceptual understanding query
        # "index"/"embed" — also match in "faissvectorindex"/"embeddings" for this query type
        - faiss
        - vector
        - vectors
        - index
        - embed

    coderankembed:
      weight: 1.2
      description: "Code localization — find/locate specific functions, classes, and call sites"
      keywords:
        # Category A — Navigational verbs (plan vocabulary: find/locate/where)
        - find
        - locate
        - localize
        - look for
        - look up
        - find the function
        - find the method
        - find the class
        - find the code
        - find where
        - locate the function
        - locate the code
        - where is
        - where are
        - which function
        - which method
        - which class
        - which file
        # Call graph vocabulary
        - caller
        - callers
        - callee
        - callees
        - call site
        - call sites
        - called by
        - who calls
        - calls into
        # Definition/symbol lookup
        - defined
        - definition
        - declaration
        - find definition
        # Category C — Docstring-behavioral (CodeRankEmbed training distribution)
        - responsible for
        - handles
        - processes
        - computes
        - returns
        - performs
        - function that
        - method that
        - class that
        - code that
        - code which
        # Plan verification vocabulary
        - grep
        - trace
        - tracing

# ============================================================================
# Lightweight Model Pool Configuration (8GB VRAM GPUs)
# ============================================================================
# Used when multi_model_pool="lightweight-speed"
# Models: BGE-M3 + GTE-ModernBERT (proven combination)

lightweight_pool:
  # Default for lightweight pools
  default_model: bge_m3

  # Lightweight precedence (2-model tier breaking)
  precedence:
    - code_model
    - bge_m3

  # Model-specific routing rules
  models:
    code_model:  # Maps to gte_modernbert
      weight: 1.5  # Prioritize code model for code queries
      description: "Code-specific queries (routes to gte-modernbert)"
      keywords:
        # Code implementation and algorithms (VALIDATED: 5/11 wins)
        - implementation
        - implement
        - implementing
        - algorithm
        - algorithmic
        - function
        - method
        - class
        - code
        - how does  # Benchmark winner: implementation details
        - how do
        - how is
        # Parsing and chunking (VALIDATED: parse/chunk queries won)
        - parse
        - parsing
        - parser
        - chunk
        - chunking
        # Validation logic (VALIDATED: validate chunk id query won)
        - validate
        - validation
        - validator
        - normalize
        # Error handling
        - error
        - error handling
        - exception
        - try except
        - catch
        - raise
        # Data structures and types (VALIDATED: found dataclass in results)
        - data structure
        - dataclass
        - dataclasses
        - type definition
        - type schema
        - merkle
        - tree structure
        - graph
        - binary
        - dag
        - schema
        # OOP concepts (VALIDATED: base class queries won)
        - base class
        - inheritance
        - extends
        - inherits
        # Search and algorithms
        - search
        - searching
        - bm25
        - multi-hop
        - recursive
        - iterative
        # Async programming
        - async
        - await
        - coroutine
        - concurrent
        # Code analysis and extraction (VALIDATED: extraction queries won)
        - extract
        - extraction
        - extractor
        - handler
        - handlers
        # Call graph (VALIDATED: call graph extraction won)
        - call graph
        - caller
        - callers
        - callee
        - callees
        - dependency
        - dependencies
        - relationship
        - relationships
        # Snapshot and change detection (from merkle queries)
        - snapshot
        - change detection

    bge_m3:
      weight: 1.0  # Default fallback
      description: "Workflow, configuration, and system queries"
      keywords:
        # Workflow and configuration (VALIDATED: BGE strength)
        - workflow
